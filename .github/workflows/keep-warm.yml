# Keep the Render free-tier backend warm (Phase 3 latency fix #1).
#
# Render spins the instance down after ~15 min without traffic; the next
# request then pays a measured ~72s cold start. Pinging /health every 10
# minutes keeps the process alive so real users never pay it.
#
# DELIBERATE TRADE-OFF (see OBSERVABILITY.md, M7): this defeats Render's
# spin-down, so the instance consumes free-tier instance-hours 24/7, and
# production latency numbers become "warm-only". To stand down: disable this
# workflow in GitHub → Actions, or delete this file.
#
# GitHub cron is best-effort (runs can drift by a few minutes under load) —
# fine for keep-warm. Replace with Grafana Synthetic Monitoring when setting
# up M7 to get uptime alerting on top.
name: keep-warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend /health
        # --max-time 100 tolerates the one cold start this job exists to
        # prevent (the first ping after a deploy/idle gap may still hit one).
        run: |
          curl -sf --max-time 100 https://trialreads-backend.onrender.com/health
          echo "backend is warm"
